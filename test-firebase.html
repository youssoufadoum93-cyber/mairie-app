<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Firebase</title>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <style>
    body{font-family:sans-serif;max-width:500px;margin:40px auto;padding:20px;background:#f1f5f9;}
    h2{margin-bottom:20px;}
    .box{background:#fff;border-radius:12px;padding:18px;margin-bottom:14px;box-shadow:0 2px 8px rgba(0,0,0,.08);}
    .ok{color:#16a34a;font-weight:700;font-size:1rem;}
    .err{color:#dc2626;font-weight:700;font-size:.95rem;}
    .info{color:#1a56db;font-size:.88rem;margin-top:6px;}
    button{width:100%;padding:14px;background:#1a56db;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:8px;}
    #log{font-size:.82rem;line-height:1.8;white-space:pre-wrap;}
  </style>
</head>
<body>
<h2>🔧 Diagnostic Firebase</h2>

<div class="box">
  <div id="step1">⏳ Connexion à Firebase...</div>
</div>
<div class="box">
  <div id="step2">⏳ En attente...</div>
</div>
<div class="box">
  <div id="step3">⏳ En attente...</div>
</div>
<div class="box">
  <button onclick="syncDoleancesLocales()" style="background:#7c3aed;font-size:1rem">📝 SYNCHRONISER MES DOLÉANCES VERS FIREBASE</button>
  <div style="font-size:.8rem;color:#6b7280;margin-top:8px;text-align:center">Appuyez ici si vos doléances n'apparaissent pas chez l'admin</div>
  <button onclick="syncDemandesLocales()" style="background:#16a34a;font-size:1rem;margin-top:10px">🔄 SYNCHRONISER MES DEMANDES VERS FIREBASE</button>
  <div style="font-size:.8rem;color:#6b7280;margin-top:8px;text-align:center">Appuyez ici si vos demandes n'apparaissent pas chez l'admin</div>
</div>
<div class="box">
  <button onclick="testDoleances()" style="background:#16a34a">📝 Voir doléances dans Firebase</button>
  <button onclick="testEcrireDoleance()" style="margin-top:8px;background:#7c3aed">📝 Écrire une doléance test</button>
  <button onclick="testLecture()" style="margin-top:8px;background:#6b7280">📥 Voir alertes dans Firebase</button>
  <button onclick="testDemandes()" style="margin-top:8px;background:#1a56db">📄 Voir demandes dans Firebase</button>
  <button onclick="testEcrireDemande()" style="margin-top:8px;background:#0891b2">📝 Écrire une demande test</button>
  <button onclick="testEcriture()" style="margin-top:8px;background:#ea580c">📢 Écrire une alerte test</button>
</div>
<div class="box">
  <div style="font-weight:700;margin-bottom:8px">📋 Journal :</div>
  <div id="log">—</div>
</div>

<script>
const FB_CONFIG={
  apiKey:"AIzaSyCaAWYZhxLWkX6NkQA9gzekguNVC0NFkXQ",
  authDomain:"mairie-app-1f27a.firebaseapp.com",
  databaseURL:"https://mairie-app-1f27a-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"mairie-app-1f27a",
  storageBucket:"mairie-app-1f27a.firebasestorage.app",
  messagingSenderId:"319201016941",
  appId:"1:319201016941:web:643170e86296ffe8491364"
};

let db=null;
const log=[];
function addLog(msg){log.push(new Date().toLocaleTimeString('fr-FR')+' — '+msg);document.getElementById('log').textContent=log.join('\n');}

// ÉTAPE 1 : Connexion
try{
  firebase.initializeApp(FB_CONFIG);
  db=firebase.database();
  document.getElementById('step1').innerHTML='<span class="ok">✅ Étape 1 : Firebase SDK chargé et initialisé</span>';
  addLog('Firebase initialisé avec succès');
}catch(e){
  document.getElementById('step1').innerHTML='<span class="err">❌ Étape 1 ERREUR : '+e.message+'</span>';
  addLog('ERREUR init : '+e.message);
}

// ÉTAPE 2 : Vérifier la connexion réseau
if(db){
  const connRef=firebase.database().ref('.info/connected');
  connRef.on('value',snap=>{
    if(snap.val()===true){
      document.getElementById('step2').innerHTML='<span class="ok">✅ Étape 2 : Connexion réseau Firebase confirmée</span>';
      addLog('Connexion réseau : OK');
    } else {
      document.getElementById('step2').innerHTML='<span class="err">❌ Étape 2 : Déconnecté de Firebase</span><div class="info">Vérifiez votre connexion internet</div>';
      addLog('Connexion réseau : DÉCONNECTÉ');
    }
  });
}

// ÉTAPE 3 : Écouter les alertes
if(db){
  db.ref('alertes').on('value',snap=>{
    const v=snap.val();
    const nb=v?Object.keys(v).length:0;
    document.getElementById('step3').innerHTML=`<span class="ok">✅ Étape 3 : Lecture OK — ${nb} alerte(s) dans Firebase</span>`;
    addLog(`Lecture alertes : ${nb} entrée(s)`);
    if(v) Object.values(v).forEach(a=>addLog('  → ['+a.type+'] '+a.titre));
  },(err)=>{
    document.getElementById('step3').innerHTML='<span class="err">❌ Étape 3 ERREUR LECTURE : '+err.message+'</span><div class="info">→ Vérifiez les règles Firebase (Realtime Database → Règles)</div>';
    addLog('ERREUR LECTURE : '+err.message);
  });
}

function syncDoleancesLocales(){
  if(!db){addLog('ERREUR : Firebase non connecté');return;}
  const raw=localStorage.getItem('doleances');
  const dols=raw?JSON.parse(raw):[];
  if(!dols.length){addLog('⚠️ Aucune doléance dans le stockage local');return;}
  addLog('📝 '+dols.length+' doléance(s) trouvée(s) — synchronisation...');
  const promises=dols.map(d=>{
    const dFb={...d,photo:null};
    return db.ref('doleances/'+d.id).set(dFb)
      .then(()=>addLog('  ✅ '+d.titre+' — '+d.citoyen+' ('+d.ref+')'));
  });
  Promise.all(promises)
    .then(()=>{
      addLog('✅ SYNCHRONISATION TERMINÉE ! Allez sur admin → Doléances citoyens');
    })
    .catch(e=>addLog('❌ Erreur : '+e.message));
}

function syncDemandesLocales(){
  if(!db){addLog('ERREUR : Firebase non connecté');return;}
  // Lire depuis localStorage (même domaine = même stockage)
  const raw=localStorage.getItem('demandes_doc');
  const dems=raw?JSON.parse(raw):[];
  if(!dems.length){
    addLog('⚠️ Aucune demande trouvée dans votre stockage local');
    addLog('→ Soumettez d\'abord une demande depuis l\'app mobile');
    addLog('→ Ou cliquez "Écrire une demande test" pour en créer une');
    return;
  }
  addLog('📄 '+dems.length+' demande(s) trouvée(s) localement — synchronisation...');
  const promises=dems.map(d=>{
    return db.ref('demandes/'+d.id).set(d)
      .then(()=>addLog('  ✅ '+d.label+' — '+d.citoyen+' ('+d.ref+')'));
  });
  Promise.all(promises)
    .then(()=>{
      addLog('✅ SYNCHRONISATION TERMINÉE ! Allez sur admin → Demandes → 🔄 Actualiser');
      addLog('');
      addLog('🔔 L\'admin peut maintenant voir vos demandes !');
    })
    .catch(e=>addLog('❌ Erreur : '+e.message));
}

function testDoleances(){
  if(!db){addLog('ERREUR : Firebase non initialisé');return;}
  addLog('Lecture des doléances dans Firebase...');
  db.ref('doleances').once('value')
    .then(snap=>{
      const v=snap.val();
      const nb=v?Object.keys(v).length:0;
      addLog('📝 DOLÉANCES : '+nb+' trouvée(s)');
      if(v) Object.values(v).forEach(d=>addLog('  → ['+d.cat+'] '+d.titre+' — '+d.citoyen+' ('+d.statut+')'));
      else addLog('⚠️ Aucune doléance dans Firebase — le mobile na pas écrit ou Firebase bloqué');
    })
    .catch(e=>addLog('❌ ERREUR lecture doléances : '+e.message));
}

function testEcrireDoleance(){
  if(!db){addLog('ERREUR : Firebase non initialisé');return;}
  const dol={
    id:Date.now(),ref:'DOL-TEST-001',
    cat:'route',titre:'Test doléance voirie',
    desc:'Test de synchronisation doléance depuis diagnostic.',
    quartier:'Centre-ville',urgence:'normale',personnes:'1-5',
    statut:'nouveau',date:new Date().toISOString().slice(0,10),
    citoyen:'Test Citoyen',lat:12.365,lng:15.044,photo:null,
    timeline:[{date:new Date().toISOString().slice(0,10),label:'Doléance test',note:'Test diagnostic',type:'submit'}]
  };
  addLog('Écriture doléance test dans Firebase...');
  db.ref('doleances/'+dol.id).set(dol)
    .then(()=>addLog('✅ DOLÉANCE ÉCRITE ! Allez dans admin → Doléances citoyens'))
    .catch(e=>addLog('❌ ERREUR : '+e.message+' — Vérifiez les règles Firebase !'));
}

function testEcriture(){
  if(!db){addLog('ERREUR : Firebase non initialisé');return;}
  const alerte={id:Date.now(),type:'info',titre:'Alerte test — '+new Date().toLocaleTimeString('fr-FR'),msg:'Test de synchronisation Firebase.',quartiers:['tous'],date:new Date().toISOString().slice(0,10),heure:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),lu:false};
  addLog('Tentative écriture alerte...');
  db.ref('alertes/'+alerte.id).set(alerte)
    .then(()=>addLog('✅ ÉCRITURE ALERTE RÉUSSIE !'))
    .catch(e=>addLog('❌ ERREUR : '+e.message));
}

function testLecture(){
  if(!db){addLog('ERREUR : Firebase non initialisé');return;}
  addLog('Lecture manuelle alertes...');
  db.ref('alertes').once('value')
    .then(snap=>{
      const v=snap.val();
      const nb=v?Object.keys(v).length:0;
      addLog('✅ ALERTES : '+nb+' trouvée(s)');
      if(v) Object.values(v).forEach(a=>addLog('  → ['+a.type+'] '+a.titre));
    })
    .catch(e=>addLog('❌ ERREUR : '+e.message));
}

function testDemandes(){
  if(!db){addLog('ERREUR : Firebase non initialisé');return;}
  addLog('Lecture des demandes dans Firebase...');
  db.ref('demandes').once('value')
    .then(snap=>{
      const v=snap.val();
      const nb=v?Object.keys(v).length:0;
      addLog('📄 DEMANDES : '+nb+' trouvée(s)');
      if(v) Object.values(v).forEach(d=>addLog('  → ['+d.type+'] '+d.label+' — '+d.citoyen+' ('+d.statut+')'));
      else addLog('⚠️ Aucune demande — le mobile na pas écrit dans Firebase');
    })
    .catch(e=>addLog('❌ ERREUR lecture demandes : '+e.message));
}

function testEcrireDemande(){
  if(!db){addLog('ERREUR : Firebase non initialisé');return;}
  const dem={
    id:Date.now(),ref:'DEM-TEST-001',
    type:'naissance',label:'Acte de naissance',ico:'📄',
    citoyen:'Test Citoyen',tel:'600000000',
    donnees:{nom:'Test',prenom:'Citoyen',date_naissance:'1990-01-01'},
    retrait:'guichet',date:new Date().toISOString().slice(0,10),
    statut:'en_attente',commentaire:''
  };
  addLog('Écriture demande test dans Firebase...');
  db.ref('demandes/'+dem.id).set(dem)
    .then(()=>addLog('✅ DEMANDE ÉCRITE ! Allez dans admin → Demandes → Actualiser'))
    .catch(e=>addLog('❌ ERREUR : '+e.message));
}
</script>
</body>
</html>
